<!doctype html>

<html>
<head>
  <title> jdaumeyer.com </title>

  
  
  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>@import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap');
* {

    /* Colorscheme */
    color-scheme: light dark;
    /* --background-color: light-dark(#eff1f5, #1e1e2e); */
    /* --text-color: light-dark(#4c4f69, #cdd6f4); */
    /* --light-accent: light-dark(#cba6f7, #ea76cb); */
    /* --dark-accent: light-dark(#ca9ee6, #ea76cb); */
    --spacing: 2rem;
    sizing: border-box;

body {
    margin: 0 auto;
    font-size: 1em;
    background-color: var(--background-color);
    color: var(--text-color);
    fill: var(--text-color);
    font-family: "Schibsted Grotesk", sans-serif;
    line-height: 1.75rem;
    max-width: min(80ch, 90vw);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: calc(var(--spacing, 1.75rem) / 2);

}

main {
    margin: 7em auto;
}

.card {
    width: max-content;
}

img {
    width: 100%;
}

header {
    margin: 2em 0;
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
}

footer {
    margin: auto 0 0 0;
}


header span {
    display: none;
}

@media (min-width: 768px) {
    header span {
        display: inline-block !important;
    }
}

h1 {
    font-weight: 900;
    font-size: 1.8rem;
}

h2 {
    font-size: 1.4rem;
    font-weight: 900;
    margin: 0;
}


#about {
    display: flex;
    flex-flow: row wrap;
    gap: 1em;
    div {
        flex: 1 1 calc(100% - 18rem);
    }
    img {
        width: 15rem;
        height: 15rem;
        flex-basis: 0 0 15rem;
        border-radius: 15px;
    }
}


nav > ul {
    margin: 0;
    display: flex;
    flex-direction: row;
    gap: 1em;
    list-style: none;
    padding-left: 0;

    & .current {
        font-weight: 800;
    }
}

a {
    text-decoration: none;
    border-bottom: 2px dotted;
    transition: 200ms;
    color: var(--text-color);
}

.uses-container {
    display: flex;
    flex-flow: row wrap;
    gap: var(--spacing);
    width: 100%;
    justify-content: space-between;
}

.social-links {
    display: flex;
    flex-flow: row nowrap;
    padding: 0;
    list-style: none;
    gap: 1rem;
}
details {
    /* transform: scale(0); */
& summary {
    cursor: pointer;
    border: 2px solid var(--dark-accent);
    width: min-content;
    padding: calc(var(--spacing)/4);
    border-radius: 15px;
    font-weight: 800;
}
/* transition: 200ms; */
/* transform-property: transform; */
border: 2px solid #ffffff00;
    border-radius: 15px;
    /* width: 40%; */
    flex: 1 0;
}

details[open] {
    border: 2px solid var(--dark-accent);
    transform: scale(1);

    & summary {
        border: none;
    }
}

a:hover {
    border-bottom: 2px solid;
    /* background-color: var(--dark-accent) */

}

.chip {
        border: 1px solid var(--dark-accent);
        background-color: var(--light-accent);
        padding: calc(var(--spacing) / 4);
        border-radius: 10px;
        transition: 200ms;

        &:has(a):hover {
            background-color: var(--dark-accent);
            transform: scale(1.1);
        }

        & a {
            border: none;
        }
}

/* Stack Layout */
/* https://every-layout.dev/layouts/stack/ */
.stack {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
}

.stack > * {
    margin-block: 0;
}

.stack > * + * {
    margin-block-start: var(--spacing, 1.5rem);
}


/* https://www.a11yproject.com/posts/how-to-hide-content/ */
.visually-hidden:not(:focus):not(:active) {
	clip: rect(0 0 0 0);
	clip-path: inset(50%);
	height: 1px;
	overflow: hidden;
	position: absolute;
	white-space: nowrap;
	width: 1px;
}

#skip-link {
	text-decoration: none;
	background: var(--background-color);
	color: var(--text-color);
	padding: 0.5rem 1rem;
	border: 1px solid var(--color-gray-90);
	border-radius: 2px;
}

/* Prevent visually-hidden skip link fom pushing content around when focused */
#skip-link.visually-hidden:focus {
	position: absolute;
	top: 1rem;
	left: 1rem;
	/* Ensure it is positioned on top of everything else when it is shown */
	z-index: 999;
}
* {
    color-scheme: light dark;
    --background-color: light-dark(#fff, #000);
    --text-color: light-dark(#000, #fff);
    --light-accent: light-dark(#eee, #111);
    --dark-accent: light-dark(#ddd, #333);
}
@keyframes slide-in-from-bottom {
    0% {
        filter: blur(10px);
        transform: translateY(5rem);
        opacity: 0;
    }

    100% {
        filter: blur(0px);
        transform: translateY(0);
        opacity: 1;
    }
}

.slide-in-from-bottom {
    animation: 500ms ease-in-out slide-in-from-bottom;
    position: relative;
    /* overflow: clip; */
}

@keyframes slide-in-from-right {
     0% {
        filter: blur(10px);
        transform: translateX(5rem);
        opacity: 0;
    }

    100% {
        filter: blur(0px);
        transform: translateX(0);
        opacity: 1;
    }
}

.slide-in-from-right {
    animation: 500ms ease-in-out slide-in-from-right;
}

@keyframes slide-in-from-left {
     0% {
        filter: blur(10px);
        transform: translateX(-5rem);
        opacity: 0;
    }

    100% {
        filter: blur(0px);
        transform: translateX(0);
        opacity: 1;
    }
}

.slide-in-from-left {
    animation: 500ms ease-in-out slide-in-from-left;
}
#bloglist {
    display: flex;
    flex-direction: row-reverse;
    flex-wrap: wrap;
    gap: 1ch;
    justify-content: space-between;
}

#bloglist h1 {
    flex-basis: 100%;
}

.postlist {
    flex-grow: 1;
}

.taglist-wrapper {
    flex: 1 0 20ch;


}

.taglist {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 0.5em;


    list-style: none;
    padding: 0;
}
.postlink {
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: var(--postlist-hover-transition-length);
    padding: calc(var(--spacing) / 4) 0em;
    position: relative;
    border-bottom: 2px solid var(--dark-accent, white);
}

.postlist {
    list-style: none;
    padding: 0;
    --postlist-hover-transition-length: 300ms;

    a:after {
        color: var(--background-color);
        content: "→";
        transition: 200ms;
        border: none;
    }
}

.postlink:has(a:hover) {
    margin-left: calc(var(--spacing)/4);
    margin-right: calc(var(--spacing)/4);

    a:after {
        color: var(--text-color);
    }
}

.postlink:after {
    opacity: 0;
    transition: var(--postlist-hover-transition-length);
}</style>

<body>

  <main id="main" class="stack">
    
<section id="bloglist">
    
<h1> Portfolio </h1>
<!-- begin postlist.njk -->
<ol reverse="" id="postlist" class="postlist stack h-feed"></ol>
